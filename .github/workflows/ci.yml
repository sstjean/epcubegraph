name: CI

on:
  push:
    branches: [main, '001-data-ingestor']
  pull_request:
    branches: [main]

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: '1'
  DOTNET_NOLOGO: 'true'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 'true'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        working-directory: api
        run: dotnet restore EpCubeGraph.sln

      - name: Build
        working-directory: api
        run: dotnet build EpCubeGraph.sln --no-restore --configuration Release

      - name: Unit Tests
        working-directory: api
        run: >
          dotnet test EpCubeGraph.sln
          --no-build
          --configuration Release
          --filter "FullyQualifiedName~Unit"
          --collect:"XPlat Code Coverage"
          --results-directory ./TestResults

      - name: Integration Tests
        working-directory: api
        run: >
          dotnet test EpCubeGraph.sln
          --no-build
          --configuration Release
          --filter "FullyQualifiedName~Integration"
          --collect:"XPlat Code Coverage"
          --results-directory ./TestResults

      - name: Enforce coverage threshold
        working-directory: api
        run: |
          # Parse all Cobertura reports and verify line coverage >= 100%
          THRESHOLD=100
          REPORTS=$(find ./TestResults -name 'coverage.cobertura.xml' 2>/dev/null)
          if [ -z "$REPORTS" ]; then
            echo "::error::No coverage reports found"
            exit 1
          fi
          # Extract line-rate from each report (0.0 - 1.0 scale)
          FAILED=0
          for report in $REPORTS; do
            LINE_RATE=$(grep -o 'line-rate="[^"]*"' "$report" | head -1 | grep -o '[0-9.]*')
            PERCENT=$(echo "$LINE_RATE * 100" | bc -l | cut -d. -f1)
            echo "Coverage: ${PERCENT}% (from $report)"
            if [ "$PERCENT" -lt "$THRESHOLD" ]; then
              echo "::error::Coverage ${PERCENT}% is below threshold ${THRESHOLD}%"
              FAILED=1
            fi
          done
          if [ "$FAILED" -eq 1 ]; then exit 1; fi
          echo "✓ All coverage reports meet ${THRESHOLD}% threshold"

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/TestResults/**/coverage.cobertura.xml

  docker-local:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Docker Compose Build (local stack)
        working-directory: local
        run: docker compose build

  docker-api:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build API Container Image
        working-directory: api
        run: |
          docker build \
            --tag epcubegraph-api:${{ github.sha }} \
            --tag epcubegraph-api:ci \
            .

  validate-infra:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: infra
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: infra
        run: terraform validate

      - name: Terraform Format Check
        working-directory: infra
        run: terraform fmt -check -recursive

  validate-tools:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate Tool Manifest Sync
        run: ./scripts/validate-tool-sync.sh
