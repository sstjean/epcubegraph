name: CI

on:
  push:
    branches: ['**']
    paths-ignore:
      - 'specs/**'
      - '.specify/**'
      - '**/*.md'
      - '.gitignore'
  workflow_dispatch:

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: '1'
  DOTNET_NOLOGO: 'true'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 'true'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        working-directory: api
        run: dotnet restore EpCubeGraph.sln

      - name: Build
        working-directory: api
        run: dotnet build EpCubeGraph.sln --no-restore --configuration Release

      - name: Unit Tests
        working-directory: api
        run: >
          dotnet test EpCubeGraph.sln
          --no-build
          --configuration Release
          --filter "FullyQualifiedName~Unit"
          --collect:"XPlat Code Coverage"
          --results-directory ./TestResults
          --settings tests/EpCubeGraph.Api.Tests/coverlet.runsettings

      - name: Integration Tests
        working-directory: api
        run: >
          dotnet test EpCubeGraph.sln
          --no-build
          --configuration Release
          --filter "FullyQualifiedName~Integration"
          --collect:"XPlat Code Coverage"
          --results-directory ./TestResults
          --settings tests/EpCubeGraph.Api.Tests/coverlet.runsettings

      - name: Enforce coverage threshold
        working-directory: api
        run: |
          # Merge coverage reports from unit + integration runs, then check threshold
          dotnet tool install --global dotnet-reportgenerator-globaltool --version 5.4.5
          reportgenerator \
            -reports:"./TestResults/**/coverage.cobertura.xml" \
            -targetdir:./CoverageMerged \
            -reporttypes:Cobertura

          THRESHOLD=100
          REPORT="./CoverageMerged/Cobertura.xml"
          if [ ! -f "$REPORT" ]; then
            echo "::error::Merged coverage report not found"
            exit 1
          fi
          LINE_RATE=$(grep -o 'line-rate="[^"]*"' "$REPORT" | head -1 | grep -o '[0-9.]*')
          PERCENT=$(echo "$LINE_RATE * 100" | bc -l | cut -d. -f1)
          echo "Combined coverage: ${PERCENT}%"
          if [ "$PERCENT" -lt "$THRESHOLD" ]; then
            echo "::error::Combined coverage ${PERCENT}% is below threshold ${THRESHOLD}%"
            exit 1
          fi
          echo "✓ Combined coverage meets ${THRESHOLD}% threshold"

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: api/TestResults/**/coverage.cobertura.xml

  exporter-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install opencv-python-headless pycryptodome numpy PyJWT pytest

      - name: Run exporter tests
        working-directory: local/epcube-exporter
        run: pytest test_exporter.py -v

  docker-local:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Docker Compose Build (local stack)
        working-directory: local
        run: docker compose -f docker-compose.local.yml build

  docker-api:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Build API Container Image
        working-directory: api
        run: |
          docker build \
            --tag epcubegraph-api:${{ github.sha }} \
            --tag epcubegraph-api:ci \
            .

  validate-infra:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform Init
        working-directory: infra
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: infra
        run: terraform validate

      - name: Terraform Format Check
        working-directory: infra
        run: terraform fmt -check -recursive

  validate-tools:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Validate Tool Manifest Sync
        run: ./scripts/validate-tool-sync.sh

  dashboard:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        working-directory: dashboard
        run: npm ci

      - name: Type check
        working-directory: dashboard
        run: npm run typecheck

      - name: Test with coverage
        working-directory: dashboard
        run: npm run test:coverage

      - name: Build
        working-directory: dashboard
        run: npm run build
