name: CD

on:
  # Deploy after CI passes — staging for branches, production for main.
  # No push trigger: workflow_run fires once after CI, preventing duplicate
  # CD runs. Path filtering (specs, docs, .gitignore) lives in CI's
  # paths-ignore — if CI doesn't run, workflow_run never fires.
  # Use workflow_dispatch to test cd.yml changes on branches.
  # (Fixes #47)
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: ['**']

  # Manual trigger for any environment
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      branch_name:
        description: 'Branch name for staging destroy (ignored for production)'
        required: false
        default: ''
        type: string
      destroy:
        description: 'Destroy resources after validation (for ephemeral test deployments)'
        required: false
        default: false
        type: boolean

# Limit to one deployment at a time per environment
concurrency:
  group: deploy-${{ (github.event_name == 'workflow_run' && github.event.workflow_run.head_branch == 'main') && 'production' || github.event.workflow_run.head_branch || github.event.inputs.environment || 'staging' }}
  cancel-in-progress: false

env:
  # East US and East US 2 are currently restricted for PostgreSQL Flexible Server
  # on this subscription, so branch and production deployments use Central US.
  TF_VAR_location: 'centralus'
  ARM_USE_OIDC: 'true'
  TFSTATE_STORAGE_ACCOUNT: 'tfstateepcubegraph'
  TFSTATE_RESOURCE_GROUP: 'tfstate-rg'

permissions:
  id-token: write   # OIDC token for Azure login
  contents: read

jobs:
  # ── Staging: deploy after CI passes on non-main branches, or manual dispatch ──
  check-ci:
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch != 'main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging' && github.event.inputs.destroy != 'true')
    outputs:
      env_name: ${{ steps.env.outputs.env_name }}
      state_key: ${{ steps.env.outputs.state_key }}
    steps:
      - name: Compute branch-specific environment name
        id: env
        run: |
          BRANCH="${{ github.event.workflow_run.head_branch || github.ref_name || 'staging' }}"
          # Sanitize: lowercase, replace non-alphanumeric with hyphens, collapse,
          # strip leading/trailing hyphens, prefix with 'b' if starts with digit,
          # truncate to fit epcubegraph-{branch} ≤ 21 chars (Terraform limit)
          SANITIZED=$(echo "$BRANCH" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' | sed 's/^-//;s/-$//' | cut -c1-8 | sed 's/-$//')
          [[ "$SANITIZED" =~ ^[0-9] ]] && SANITIZED="b${SANITIZED}" && SANITIZED=$(echo "$SANITIZED" | cut -c1-8)
          ENV_NAME="epcubegraph-${SANITIZED}"
          echo "env_name=${ENV_NAME}" >> "$GITHUB_OUTPUT"
          echo "state_key=${ENV_NAME}.tfstate" >> "$GITHUB_OUTPUT"
          echo "✓ Branch '$BRANCH' → env '${ENV_NAME}'"

  deploy-staging:
    needs: check-ci
    runs-on: self-hosted
    if: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.destroy == 'true') }}
    environment: staging

    env:
      TF_VAR_environment_name: ${{ needs.check-ci.outputs.env_name }}

    outputs:
      resource_group: ${{ steps.tf-output.outputs.resource_group }}
      api_fqdn: ${{ steps.tf-output.outputs.api_fqdn }}
      postgres_fqdn: ${{ steps.tf-output.outputs.postgres_fqdn }}
      exporter_fqdn: ${{ steps.tf-output.outputs.exporter_fqdn }}
      swa_hostname: ${{ steps.tf-output.outputs.swa_hostname }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      # Phase 0: Bootstrap — create RG, KV, and runner PE (separate state)
      - name: Bootstrap Init
        working-directory: infra/bootstrap
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          terraform init -input=false \
            -backend-config="resource_group_name=tfstate-rg" \
            -backend-config="storage_account_name=tfstateepcubegraph" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=${{ needs.check-ci.outputs.state_key }}-bootstrap" \
            -backend-config="use_oidc=true" \
            -backend-config="use_azuread_auth=true"

      - name: Bootstrap Apply
        working-directory: infra/bootstrap
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_environment_name: ${{ needs.check-ci.outputs.env_name }}
        run: terraform apply -auto-approve -input=false

      # Phase 1: Main infrastructure
      - name: Terraform Init
        working-directory: infra
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          terraform init -input=false \
            -backend-config="resource_group_name=tfstate-rg" \
            -backend-config="storage_account_name=tfstateepcubegraph" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=${{ needs.check-ci.outputs.state_key }}" \
            -backend-config="use_oidc=true" \
            -backend-config="use_azuread_auth=true"

      # Preserve existing container app images
        id: existing-images
        working-directory: infra
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          STATE=$(terraform show -json 2>/dev/null) || STATE="{}"
          API_IMG=$(echo "$STATE" | jq -r '
            .values.root_module.resources[]?
            | select(.address == "azurerm_container_app.api[0]")
            | .values.template[0].container[0].image' 2>/dev/null) || API_IMG=""
          EXPORTER_IMG=$(echo "$STATE" | jq -r '
            .values.root_module.resources[]?
            | select(.address == "azurerm_container_app.exporter[0]")
            | .values.template[0].container[0].image' 2>/dev/null) || EXPORTER_IMG=""
          [ "$API_IMG" = "null" ] && API_IMG=""
          [ "$EXPORTER_IMG" = "null" ] && EXPORTER_IMG=""
          echo "api_image=${API_IMG}" >> "$GITHUB_OUTPUT"
          echo "epcube_image=${EXPORTER_IMG}" >> "$GITHUB_OUTPUT"
          echo "✓ Existing images: api=${API_IMG:-none} exporter=${EXPORTER_IMG:-none}"

      # Phase 1: Deploy infrastructure (preserving existing container apps)
      - name: Terraform Apply — Infrastructure
        working-directory: infra
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_epcube_username: ${{ secrets.EPCUBE_USERNAME }}
          TF_VAR_epcube_password: ${{ secrets.EPCUBE_PASSWORD }}
          TF_VAR_api_image: ${{ steps.existing-images.outputs.api_image }}
          TF_VAR_epcube_image: ${{ steps.existing-images.outputs.epcube_image }}
        run: terraform apply -auto-approve -input=false -var-file=custom-domains-staging.tfvars

      # Phase 2: Build and push container images
      # Re-authenticate — OIDC token may have expired during long infrastructure apply
      - name: Azure Re-Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get ACR details
        id: acr
        working-directory: infra
        run: |
          echo "name=$(terraform output -raw acr_name)" >> "$GITHUB_OUTPUT"
          echo "server=$(terraform output -raw acr_login_server)" >> "$GITHUB_OUTPUT"

      - name: ACR Login
        run: az acr login --name ${{ steps.acr.outputs.name }}

      - name: Build & Push API image
        id: api-image
        run: |
          DEPLOY_SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          IMAGE="${{ steps.acr.outputs.server }}/epcubegraph-api:${DEPLOY_SHA}"
          docker build --tag "$IMAGE" --file api/Dockerfile api/
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Build & Push exporter image
        id: exporter-image
        run: |
          DEPLOY_SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          IMAGE="${{ steps.acr.outputs.server }}/epcube-exporter:${DEPLOY_SHA}"
          docker build --tag "$IMAGE" --file local/epcube-exporter/Dockerfile local/epcube-exporter/
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      # Phase 3: Deploy container apps with built images
      # Re-authenticate — OIDC token may have expired during Docker builds
      - name: Azure Re-Login for Phase 3 (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Apply — Container Apps
        working-directory: infra
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_epcube_username: ${{ secrets.EPCUBE_USERNAME }}
          TF_VAR_epcube_password: ${{ secrets.EPCUBE_PASSWORD }}
          TF_VAR_api_image: ${{ steps.api-image.outputs.image }}
          TF_VAR_epcube_image: ${{ steps.exporter-image.outputs.image }}
        run: terraform apply -auto-approve -input=false -var-file=custom-domains-staging.tfvars

      - name: Capture Terraform outputs
        id: tf-output
        working-directory: infra
        run: |
          echo "resource_group=$(terraform output -raw resource_group_name)" >> "$GITHUB_OUTPUT"
          echo "api_fqdn=$(terraform output -raw api_fqdn)" >> "$GITHUB_OUTPUT"
          echo "postgres_fqdn=$(terraform output -raw postgres_fqdn)" >> "$GITHUB_OUTPUT"
          echo "exporter_fqdn=$(terraform output -raw exporter_fqdn)" >> "$GITHUB_OUTPUT"
          echo "swa_hostname=$(terraform output -raw swa_default_hostname)" >> "$GITHUB_OUTPUT"
          echo "dashboard_client_id=$(terraform output -raw dashboard_client_id)" >> "$GITHUB_OUTPUT"
          echo "entra_tenant_id=$(terraform output -raw entra_tenant_id)" >> "$GITHUB_OUTPUT"
          echo "entra_app_client_id=$(terraform output -raw entra_app_client_id)" >> "$GITHUB_OUTPUT"
          API_CUSTOM=$(terraform output -raw api_custom_url 2>/dev/null) || API_CUSTOM=""
          echo "api_custom_url=${API_CUSTOM}" >> "$GITHUB_OUTPUT"
          APPINSIGHTS_CS=$(terraform output -raw appinsights_connection_string 2>/dev/null) || APPINSIGHTS_CS=""
          echo "::add-mask::${APPINSIGHTS_CS}"
          echo "appinsights_cs=${APPINSIGHTS_CS}" >> "$GITHUB_OUTPUT"

      # Phase 4: Build and deploy dashboard SPA to Azure Static Web Apps
      - name: Get SWA deployment token
        id: swa-token
        working-directory: infra
        run: |
          TOKEN=$(terraform output -raw swa_api_key)
          echo "::add-mask::${TOKEN}"
          echo "token=${TOKEN}" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Build dashboard
        working-directory: dashboard
        env:
          VITE_API_BASE_URL: ${{ steps.tf-output.outputs.api_custom_url != '' && format('{0}/api/v1', steps.tf-output.outputs.api_custom_url) || format('https://{0}/api/v1', steps.tf-output.outputs.api_fqdn) }}
          VITE_ENTRA_CLIENT_ID: ${{ steps.tf-output.outputs.dashboard_client_id }}
          VITE_ENTRA_TENANT_ID: ${{ steps.tf-output.outputs.entra_tenant_id }}
          VITE_ENTRA_API_SCOPE: api://${{ steps.tf-output.outputs.entra_app_client_id }}/user_impersonation
          VITE_APPINSIGHTS_CONNECTION_STRING: ${{ steps.tf-output.outputs.appinsights_cs }}
        run: |
          npm ci
          npm run build

      - name: Deploy dashboard to SWA
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa-token.outputs.token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: dashboard/dist
          skip_app_build: true
          skip_api_build: true

  validate-staging:
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v6

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Wait for container apps to stabilize after deployment
      - name: Wait for deployment to stabilize
        run: sleep 60

      - name: Run deployment validation
        run: ./infra/validate-deployment.sh --rg ${{ needs.deploy-staging.outputs.resource_group }}

      - name: Wait for API revision readiness
        run: |
          RG="${{ needs.deploy-staging.outputs.resource_group }}"
          APP_NAME="${RG%-rg}-api"
          API_FQDN="${{ needs.deploy-staging.outputs.api_fqdn }}"
          if [ -z "$API_FQDN" ] || [ "$API_FQDN" = "" ]; then
            echo "API not deployed (no FQDN) — skipping revision wait"
            exit 0
          fi

          for i in $(seq 1 20); do
            REVISION_STATUS=$(az containerapp revision list \
              --name "$APP_NAME" \
              --resource-group "$RG" \
              --output json | jq -r '.[0] | "\(.properties.provisioningState)|\(.properties.runningState)|\(.properties.healthState)"')
            if [ "$REVISION_STATUS" = "Provisioned|Running|Healthy" ]; then
              echo "✓ API revision ready: $REVISION_STATUS"
              exit 0
            fi
            echo "Attempt $i/20: API revision state $REVISION_STATUS — waiting 15s..."
            sleep 15
          done

          echo "::error::API revision did not reach Provisioned/Running/Healthy in time"
          az containerapp revision list --name "$APP_NAME" --resource-group "$RG" --output json || true
          az containerapp logs show --name "$APP_NAME" --resource-group "$RG" --type system --tail 100 || true
          az containerapp logs show --name "$APP_NAME" --resource-group "$RG" --tail 100 || true
          exit 1

      - name: Smoke test — API health endpoint
        run: |
          RG="${{ needs.deploy-staging.outputs.resource_group }}"
          APP_NAME="${RG%-rg}-api"
          API_FQDN="${{ needs.deploy-staging.outputs.api_fqdn }}"
          if [ -n "$API_FQDN" ] && [ "$API_FQDN" != "" ]; then
            for i in $(seq 1 10); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "https://${API_FQDN}/api/v1/health" 2>/dev/null) || true
              if [ "$STATUS" = "200" ] || [ "$STATUS" = "503" ]; then
                echo "✓ API health endpoint responded: HTTP $STATUS"
                break
              fi
              echo "Attempt $i/10: HTTP $STATUS — retrying in 15s..."
              sleep 15
            done
            if [ "$STATUS" != "200" ] && [ "$STATUS" != "503" ]; then
              echo "::error::API health endpoint did not respond after 10 attempts"
              az containerapp revision list --name "$APP_NAME" --resource-group "$RG" --output json || true
              az containerapp logs show --name "$APP_NAME" --resource-group "$RG" --type system --tail 100 || true
              az containerapp logs show --name "$APP_NAME" --resource-group "$RG" --tail 100 || true
              exit 1
            fi
          else
            echo "API not deployed (no FQDN) — skipping smoke test"
          fi

      - name: Smoke test — PostgreSQL (internal-only check)
        run: |
          echo "✓ PostgreSQL is internal-only (zero-trust) — no external smoke test needed"
          echo "  API health endpoint validates internal connectivity"

      - name: Smoke test — epcube-exporter health
        run: |
          RG="${{ needs.deploy-staging.outputs.resource_group }}"
          APP_NAME="${RG%-rg}-exporter"
          EXPORTER_FQDN="${{ needs.deploy-staging.outputs.exporter_fqdn }}"
          if [ -n "$EXPORTER_FQDN" ] && [ "$EXPORTER_FQDN" != "" ]; then
            for i in $(seq 1 10); do
              REVISION_STATUS=$(az containerapp revision list \
                --name "$APP_NAME" \
                --resource-group "$RG" \
                --output json | jq -r '.[0] | "\(.properties.provisioningState)|\(.properties.runningState)|\(.properties.healthState)"')
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "https://${EXPORTER_FQDN}/health" 2>/dev/null) || true
              if [ "$STATUS" = "200" ] || [ "$STATUS" = "503" ]; then
                echo "✓ epcube-exporter health responded: HTTP $STATUS"
                break
              fi
              echo "Attempt $i/10: exporter revision $REVISION_STATUS, HTTP $STATUS — retrying in 15s..."
              sleep 15
            done
            if [ "$STATUS" != "200" ] && [ "$STATUS" != "503" ]; then
              echo "::error::epcube-exporter did not respond after 10 attempts"
              az containerapp revision list --name "$APP_NAME" --resource-group "$RG" --output json || true
              az containerapp logs show --name "$APP_NAME" --resource-group "$RG" --type system --tail 100 || true
              az containerapp logs show --name "$APP_NAME" --resource-group "$RG" --tail 100 || true
              exit 1
            fi
          else
            echo "epcube-exporter not deployed (no FQDN) — skipping smoke test"
          fi

      - name: Smoke test — Dashboard SWA
        run: |
          SWA_HOSTNAME="${{ needs.deploy-staging.outputs.swa_hostname }}"
          if [ -n "$SWA_HOSTNAME" ] && [ "$SWA_HOSTNAME" != "" ]; then
            for i in 1 2 3 4 5; do
              BODY=$(curl -s --max-time 15 "https://${SWA_HOSTNAME}/" 2>/dev/null) || true
              if echo "$BODY" | grep -q '<div id="app">' 2>/dev/null; then
                echo "✓ Dashboard SWA is serving the SPA"
                break
              fi
              echo "Attempt $i: SPA not ready — retrying in 15s..."
              sleep 15
            done
            if ! echo "$BODY" | grep -q '<div id="app">' 2>/dev/null; then
              echo "::error::Dashboard SWA did not serve the SPA after 5 attempts"
              exit 1
            fi
          else
            echo "Dashboard not deployed (no SWA hostname) — skipping smoke test"
          fi

  # ── Production: deploy on push to main or manual dispatch ──
  # Block deployment if CI failed
  ci-failed:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'failure'
    steps:
      - run: |
          echo "::error::CI failed on ${{ github.event.workflow_run.head_branch }} — deployment blocked"
          exit 1

  check-ci-prod:
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production' && github.event.inputs.destroy != 'true')
    steps:
      - run: echo "Production deployment — CI passed on main or manual dispatch"

  deploy-prod:
    needs: check-ci-prod
    runs-on: self-hosted
    environment: production

    env:
      TF_VAR_environment_name: 'epcubegraph'

    outputs:
      resource_group: ${{ steps.tf-output.outputs.resource_group }}
      api_fqdn: ${{ steps.tf-output.outputs.api_fqdn }}
      postgres_fqdn: ${{ steps.tf-output.outputs.postgres_fqdn }}
      exporter_fqdn: ${{ steps.tf-output.outputs.exporter_fqdn }}
      swa_hostname: ${{ steps.tf-output.outputs.swa_hostname }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Determine commit SHA
        id: commit
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            SHA="${{ github.event.workflow_run.head_sha }}"
          else
            SHA="${{ github.sha }}"
          fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "✓ Deploying commit: $SHA"

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      # Phase 0: Bootstrap — create RG, KV, and runner PE (separate state)
      - name: Bootstrap Init
        working-directory: infra/bootstrap
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          terraform init -input=false \
            -backend-config="resource_group_name=tfstate-rg" \
            -backend-config="storage_account_name=tfstateepcubegraph" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=epcubegraph-production-bootstrap.tfstate" \
            -backend-config="use_oidc=true" \
            -backend-config="use_azuread_auth=true"

      - name: Bootstrap Apply
        working-directory: infra/bootstrap
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_environment_name: 'epcubegraph'
        run: terraform apply -auto-approve -input=false

      # Phase 1: Main infrastructure
      - name: Terraform Init
        working-directory: infra
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          terraform init -input=false \
            -backend-config="resource_group_name=tfstate-rg" \
            -backend-config="storage_account_name=tfstateepcubegraph" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=epcubegraph-production.tfstate" \
            -backend-config="use_oidc=true" \
            -backend-config="use_azuread_auth=true"

      # Preserve existing container app images so the infra phase doesn't
      # destroy them (count goes to 0 when image vars are empty).
      # Reads directly from state resources (not outputs) to avoid bootstrap issues.
      - name: Preserve existing container images from state
        id: existing-images
        working-directory: infra
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          STATE=$(terraform show -json 2>/dev/null) || STATE="{}"
          API_IMG=$(echo "$STATE" | jq -r '
            .values.root_module.resources[]?
            | select(.address == "azurerm_container_app.api[0]")
            | .values.template[0].container[0].image' 2>/dev/null) || API_IMG=""
          EXPORTER_IMG=$(echo "$STATE" | jq -r '
            .values.root_module.resources[]?
            | select(.address == "azurerm_container_app.exporter[0]")
            | .values.template[0].container[0].image' 2>/dev/null) || EXPORTER_IMG=""
          [ "$API_IMG" = "null" ] && API_IMG=""
          [ "$EXPORTER_IMG" = "null" ] && EXPORTER_IMG=""
          echo "api_image=${API_IMG}" >> "$GITHUB_OUTPUT"
          echo "epcube_image=${EXPORTER_IMG}" >> "$GITHUB_OUTPUT"
          echo "✓ Existing images: api=${API_IMG:-none} exporter=${EXPORTER_IMG:-none}"

      - name: Terraform Apply — Infrastructure
        working-directory: infra
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_epcube_username: ${{ secrets.EPCUBE_USERNAME }}
          TF_VAR_epcube_password: ${{ secrets.EPCUBE_PASSWORD }}
          TF_VAR_api_image: ${{ steps.existing-images.outputs.api_image }}
          TF_VAR_epcube_image: ${{ steps.existing-images.outputs.epcube_image }}
        run: terraform apply -auto-approve -input=false -var-file=custom-domains-production.tfvars

      # Re-authenticate — OIDC token may have expired during long infrastructure apply
      - name: Azure Re-Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get ACR details
        id: acr
        working-directory: infra
        run: |
          echo "name=$(terraform output -raw acr_name)" >> "$GITHUB_OUTPUT"
          echo "server=$(terraform output -raw acr_login_server)" >> "$GITHUB_OUTPUT"

      - name: ACR Login
        run: az acr login --name ${{ steps.acr.outputs.name }}

      - name: Build & Push API image
        id: api-image
        run: |
          IMAGE="${{ steps.acr.outputs.server }}/epcubegraph-api:${{ steps.commit.outputs.sha }}"
          docker build --tag "$IMAGE" --file api/Dockerfile api/
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Build & Push exporter image
        id: exporter-image
        run: |
          IMAGE="${{ steps.acr.outputs.server }}/epcube-exporter:${{ steps.commit.outputs.sha }}"
          docker build --tag "$IMAGE" --file local/epcube-exporter/Dockerfile local/epcube-exporter/
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      # Re-authenticate — OIDC token may have expired during Docker builds
      - name: Azure Re-Login for Container Apps (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Apply — Container Apps
        working-directory: infra
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_epcube_username: ${{ secrets.EPCUBE_USERNAME }}
          TF_VAR_epcube_password: ${{ secrets.EPCUBE_PASSWORD }}
          TF_VAR_api_image: ${{ steps.api-image.outputs.image }}
          TF_VAR_epcube_image: ${{ steps.exporter-image.outputs.image }}
        run: terraform apply -auto-approve -input=false -var-file=custom-domains-production.tfvars

      - name: Capture Terraform outputs
        id: tf-output
        working-directory: infra
        run: |
          echo "resource_group=$(terraform output -raw resource_group_name)" >> "$GITHUB_OUTPUT"
          echo "api_fqdn=$(terraform output -raw api_fqdn)" >> "$GITHUB_OUTPUT"
          echo "postgres_fqdn=$(terraform output -raw postgres_fqdn)" >> "$GITHUB_OUTPUT"
          echo "exporter_fqdn=$(terraform output -raw exporter_fqdn)" >> "$GITHUB_OUTPUT"
          echo "swa_hostname=$(terraform output -raw swa_default_hostname)" >> "$GITHUB_OUTPUT"
          echo "dashboard_client_id=$(terraform output -raw dashboard_client_id)" >> "$GITHUB_OUTPUT"
          echo "entra_tenant_id=$(terraform output -raw entra_tenant_id)" >> "$GITHUB_OUTPUT"
          echo "entra_app_client_id=$(terraform output -raw entra_app_client_id)" >> "$GITHUB_OUTPUT"
          API_CUSTOM=$(terraform output -raw api_custom_url 2>/dev/null) || API_CUSTOM=""
          echo "api_custom_url=${API_CUSTOM}" >> "$GITHUB_OUTPUT"
          APPINSIGHTS_CS=$(terraform output -raw appinsights_connection_string 2>/dev/null) || APPINSIGHTS_CS=""
          echo "::add-mask::${APPINSIGHTS_CS}"
          echo "appinsights_cs=${APPINSIGHTS_CS}" >> "$GITHUB_OUTPUT"

      # Phase 4: Build and deploy dashboard SPA to Azure Static Web Apps
      - name: Get SWA deployment token
        id: swa-token
        working-directory: infra
        run: |
          TOKEN=$(terraform output -raw swa_api_key)
          echo "::add-mask::${TOKEN}"
          echo "token=${TOKEN}" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Build dashboard
        working-directory: dashboard
        env:
          VITE_API_BASE_URL: ${{ steps.tf-output.outputs.api_custom_url != '' && format('{0}/api/v1', steps.tf-output.outputs.api_custom_url) || format('https://{0}/api/v1', steps.tf-output.outputs.api_fqdn) }}
          VITE_ENTRA_CLIENT_ID: ${{ steps.tf-output.outputs.dashboard_client_id }}
          VITE_ENTRA_TENANT_ID: ${{ steps.tf-output.outputs.entra_tenant_id }}
          VITE_ENTRA_API_SCOPE: api://${{ steps.tf-output.outputs.entra_app_client_id }}/user_impersonation
          VITE_APPINSIGHTS_CONNECTION_STRING: ${{ steps.tf-output.outputs.appinsights_cs }}
        run: |
          npm ci
          npm run build

      - name: Deploy dashboard to SWA
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa-token.outputs.token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: dashboard/dist
          skip_app_build: true
          skip_api_build: true

  validate-prod:
    needs: deploy-prod
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v6

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Wait for deployment to stabilize
        run: sleep 60

      - name: Run deployment validation
        run: ./infra/validate-deployment.sh --rg ${{ needs.deploy-prod.outputs.resource_group }}

      - name: Wait for API revision readiness
        run: |
          RG="${{ needs.deploy-prod.outputs.resource_group }}"
          APP_NAME="${RG%-rg}-api"
          API_FQDN="${{ needs.deploy-prod.outputs.api_fqdn }}"
          if [ -z "$API_FQDN" ] || [ "$API_FQDN" = "" ]; then
            echo "API not deployed (no FQDN) — skipping revision wait"
            exit 0
          fi

          for i in $(seq 1 20); do
            REVISION_STATUS=$(az containerapp revision list \
              --name "$APP_NAME" \
              --resource-group "$RG" \
              --output json | jq -r '.[0] | "\(.properties.provisioningState)|\(.properties.runningState)|\(.properties.healthState)"')
            if [ "$REVISION_STATUS" = "Provisioned|Running|Healthy" ]; then
              echo "✓ API revision ready: $REVISION_STATUS"
              exit 0
            fi
            echo "Attempt $i/20: API revision state $REVISION_STATUS — waiting 15s..."
            sleep 15
          done

          echo "::error::API revision did not reach Provisioned/Running/Healthy in time"
          az containerapp revision list --name "$APP_NAME" --resource-group "$RG" --output json || true
          az containerapp logs show --name "$APP_NAME" --resource-group "$RG" --type system --tail 100 || true
          az containerapp logs show --name "$APP_NAME" --resource-group "$RG" --tail 100 || true
          exit 1

      - name: Smoke test — API health endpoint
        run: |
          RG="${{ needs.deploy-prod.outputs.resource_group }}"
          APP_NAME="${RG%-rg}-api"
          API_FQDN="${{ needs.deploy-prod.outputs.api_fqdn }}"
          if [ -n "$API_FQDN" ] && [ "$API_FQDN" != "" ]; then
            for i in $(seq 1 10); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "https://${API_FQDN}/api/v1/health" 2>/dev/null) || true
              if [ "$STATUS" = "200" ] || [ "$STATUS" = "503" ]; then
                echo "✓ API health endpoint responded: HTTP $STATUS"
                break
              fi
              echo "Attempt $i/10: HTTP $STATUS — retrying in 15s..."
              sleep 15
            done
            if [ "$STATUS" != "200" ] && [ "$STATUS" != "503" ]; then
              echo "::error::API health endpoint did not respond after 10 attempts"
              az containerapp revision list --name "$APP_NAME" --resource-group "$RG" --output json || true
              az containerapp logs show --name "$APP_NAME" --resource-group "$RG" --type system --tail 100 || true
              az containerapp logs show --name "$APP_NAME" --resource-group "$RG" --tail 100 || true
              exit 1
            fi
          else
            echo "API not deployed (no FQDN) — skipping smoke test"
          fi

      - name: Smoke test — PostgreSQL (internal-only check)
        run: |
          echo "✓ PostgreSQL is internal-only (zero-trust) — no external smoke test needed"
          echo "  API health endpoint validates internal connectivity"

      - name: Smoke test — epcube-exporter health
        run: |
          RG="${{ needs.deploy-prod.outputs.resource_group }}"
          APP_NAME="${RG%-rg}-exporter"
          EXPORTER_FQDN="${{ needs.deploy-prod.outputs.exporter_fqdn }}"
          if [ -n "$EXPORTER_FQDN" ] && [ "$EXPORTER_FQDN" != "" ]; then
            for i in $(seq 1 10); do
              REVISION_STATUS=$(az containerapp revision list \
                --name "$APP_NAME" \
                --resource-group "$RG" \
                --output json | jq -r '.[0] | "\(.properties.provisioningState)|\(.properties.runningState)|\(.properties.healthState)"')
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "https://${EXPORTER_FQDN}/health" 2>/dev/null) || true
              if [ "$STATUS" = "200" ] || [ "$STATUS" = "503" ]; then
                echo "✓ epcube-exporter health responded: HTTP $STATUS"
                break
              fi
              echo "Attempt $i/10: exporter revision $REVISION_STATUS, HTTP $STATUS — retrying in 15s..."
              sleep 15
            done
            if [ "$STATUS" != "200" ] && [ "$STATUS" != "503" ]; then
              echo "::error::epcube-exporter did not respond after 10 attempts"
              az containerapp revision list --name "$APP_NAME" --resource-group "$RG" --output json || true
              az containerapp logs show --name "$APP_NAME" --resource-group "$RG" --type system --tail 100 || true
              az containerapp logs show --name "$APP_NAME" --resource-group "$RG" --tail 100 || true
              exit 1
            fi
          else
            echo "epcube-exporter not deployed (no FQDN) — skipping smoke test"
          fi

      - name: Smoke test — Dashboard SWA
        run: |
          SWA_HOSTNAME="${{ needs.deploy-prod.outputs.swa_hostname }}"
          if [ -n "$SWA_HOSTNAME" ] && [ "$SWA_HOSTNAME" != "" ]; then
            for i in 1 2 3 4 5; do
              BODY=$(curl -s --max-time 15 "https://${SWA_HOSTNAME}/" 2>/dev/null) || true
              if echo "$BODY" | grep -q '<div id="app">' 2>/dev/null; then
                echo "✓ Dashboard SWA is serving the SPA"
                break
              fi
              echo "Attempt $i: SPA not ready — retrying in 15s..."
              sleep 15
            done
            if ! echo "$BODY" | grep -q '<div id="app">' 2>/dev/null; then
              echo "::error::Dashboard SWA did not serve the SPA after 5 attempts"
              exit 1
            fi
          else
            echo "Dashboard not deployed (no SWA hostname) — skipping smoke test"
          fi

  # ── Cleanup the merged branch's environment after successful prod deploy ──
  cleanup-branch:
    needs: validate-prod
    runs-on: self-hosted
    if: github.event_name == 'workflow_run'
    environment: staging

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Determine merged branch environment
        id: branch-env
        run: |
          # Extract branch name from the merge commit message
          COMMIT_MSG=$(git log -1 --format='%s' HEAD)
          echo "Merge commit message: $COMMIT_MSG"

          # Pattern: "Merge pull request #N from owner/branch-name"
          BRANCH=$(echo "$COMMIT_MSG" | sed -n 's|.*Merge pull request #[0-9]* from [^/]*/||p')

          # Fallback: "Merge branch 'branch-name'"
          if [ -z "$BRANCH" ]; then
            BRANCH=$(echo "$COMMIT_MSG" | sed -n "s/.*Merge branch '\([^']*\)'.*/\1/p")
          fi

          if [ -z "$BRANCH" ] || [ "$BRANCH" = "main" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No feature branch to clean up (commit: $COMMIT_MSG)"
            exit 0
          fi

          echo "Merged branch: $BRANCH"

          # Sanitize identically to check-ci job
          SANITIZED=$(echo "$BRANCH" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' | sed 's/^-//;s/-$//' | cut -c1-8 | sed 's/-$//')
          [[ "$SANITIZED" =~ ^[0-9] ]] && SANITIZED="b${SANITIZED}" && SANITIZED=$(echo "$SANITIZED" | cut -c1-8)
          ENV_NAME="epcubegraph-${SANITIZED}"
          STATE_KEY="${ENV_NAME}.tfstate"

          echo "env_name=${ENV_NAME}" >> "$GITHUB_OUTPUT"
          echo "state_key=${STATE_KEY}" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "✓ Branch '$BRANCH' → env '${ENV_NAME}' (state: ${STATE_KEY})"

      - name: Azure Login (OIDC)
        if: steps.branch-env.outputs.skip != 'true'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Check if state file exists
        if: steps.branch-env.outputs.skip != 'true'
        id: state-check
        run: |
          EXISTS=$(az storage blob exists \
            --account-name "$TFSTATE_STORAGE_ACCOUNT" \
            --container-name tfstate \
            --name "${{ steps.branch-env.outputs.state_key }}" \
            --auth-mode login \
            --query exists --output tsv 2>/dev/null) || EXISTS="false"
          echo "exists=${EXISTS}" >> "$GITHUB_OUTPUT"
          if [ "$EXISTS" = "true" ]; then
            echo "✓ State file found — will destroy environment"
          else
            echo "No state file for ${{ steps.branch-env.outputs.env_name }} — nothing to clean up"
          fi

      - name: Setup Terraform
        if: steps.branch-env.outputs.skip != 'true' && steps.state-check.outputs.exists == 'true'
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      # Init both modules — main first (destroy order), then bootstrap
      - name: Terraform Init
        if: steps.branch-env.outputs.skip != 'true' && steps.state-check.outputs.exists == 'true'
        working-directory: infra
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          terraform init -input=false \
            -backend-config="resource_group_name=tfstate-rg" \
            -backend-config="storage_account_name=tfstateepcubegraph" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=${{ steps.branch-env.outputs.state_key }}" \
            -backend-config="use_oidc=true" \
            -backend-config="use_azuread_auth=true"

      - name: Bootstrap Init
        if: steps.branch-env.outputs.skip != 'true' && steps.state-check.outputs.exists == 'true'
        working-directory: infra/bootstrap
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          terraform init -input=false \
            -backend-config="resource_group_name=tfstate-rg" \
            -backend-config="storage_account_name=tfstateepcubegraph" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=${{ steps.branch-env.outputs.state_key }}-bootstrap" \
            -backend-config="use_oidc=true" \
            -backend-config="use_azuread_auth=true"

      - name: Azure Re-Login (OIDC)
        if: steps.branch-env.outputs.skip != 'true' && steps.state-check.outputs.exists == 'true'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Destroy
        if: steps.branch-env.outputs.skip != 'true' && steps.state-check.outputs.exists == 'true'
        id: branch-destroy
        continue-on-error: true
        working-directory: infra
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_environment_name: ${{ steps.branch-env.outputs.env_name }}
          TF_VAR_epcube_username: ${{ secrets.EPCUBE_USERNAME }}
          TF_VAR_epcube_password: ${{ secrets.EPCUBE_PASSWORD }}
        run: terraform destroy -auto-approve -input=false -var-file=custom-domains-staging.tfvars

      # Re-authenticate — OIDC token may have expired during long destroy
      - name: Azure Re-Login for Retry (OIDC)
        if: steps.branch-env.outputs.skip != 'true' && steps.state-check.outputs.exists == 'true' && steps.branch-destroy.outcome == 'failure'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Destroy — Retry
        if: steps.branch-env.outputs.skip != 'true' && steps.state-check.outputs.exists == 'true' && steps.branch-destroy.outcome == 'failure'
        working-directory: infra
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_environment_name: ${{ steps.branch-env.outputs.env_name }}
          TF_VAR_epcube_username: ${{ secrets.EPCUBE_USERNAME }}
          TF_VAR_epcube_password: ${{ secrets.EPCUBE_PASSWORD }}
        run: |
          echo "⚠ First destroy failed — refreshing state and retrying with fresh token..."
          terraform refresh -input=false || true
          terraform destroy -auto-approve -input=false -var-file=custom-domains-staging.tfvars
          echo "✓ Environment ${{ steps.branch-env.outputs.env_name }} destroyed"

      - name: Delete state blob
        if: steps.branch-env.outputs.skip != 'true' && steps.state-check.outputs.exists == 'true'
        run: |
          az storage blob delete \
            --account-name "$TFSTATE_STORAGE_ACCOUNT" \
            --container-name tfstate \
            --name "${{ steps.branch-env.outputs.state_key }}" \
            --auth-mode login \
            --output none 2>/dev/null || true
          echo "✓ State file ${{ steps.branch-env.outputs.state_key }} deleted"

      # Bootstrap destroy — remove RG, KV, runner PE (reverse order)
      - name: Bootstrap Destroy
        if: steps.branch-env.outputs.skip != 'true' && steps.state-check.outputs.exists == 'true'
        working-directory: infra/bootstrap
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_environment_name: ${{ steps.branch-env.outputs.env_name }}
        run: terraform destroy -auto-approve -input=false

      - name: Delete bootstrap state blob
        if: steps.branch-env.outputs.skip != 'true' && steps.state-check.outputs.exists == 'true'
        run: |
          az storage blob delete \
            --account-name "$TFSTATE_STORAGE_ACCOUNT" \
            --container-name tfstate \
            --name "${{ steps.branch-env.outputs.state_key }}-bootstrap" \
            --auth-mode login \
            --output none 2>/dev/null
          echo "✓ Bootstrap state file deleted"

  # Tear down: only on manual request — runs directly without requiring deploy
  destroy:
    runs-on: self-hosted
    if: >
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.destroy == 'true'
    environment: ${{ github.event.inputs.environment }}

    steps:
      - uses: actions/checkout@v6

      - name: Compute environment name
        id: env
        run: |
          if [ "${{ github.event.inputs.environment }}" = "production" ]; then
            echo "env_name=epcubegraph" >> "$GITHUB_OUTPUT"
            echo "state_key=epcubegraph-production.tfstate" >> "$GITHUB_OUTPUT"
            echo "kv_name=epcubegraph-kv" >> "$GITHUB_OUTPUT"
          else
            BRANCH="${{ github.event.inputs.branch_name }}"
            if [ -z "$BRANCH" ]; then
              echo "::error::branch_name is required for staging destroy"
              exit 1
            fi
            SANITIZED=$(echo "$BRANCH" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' | sed 's/^-//;s/-$//' | cut -c1-8 | sed 's/-$//')
            [[ "$SANITIZED" =~ ^[0-9] ]] && SANITIZED="b${SANITIZED}" && SANITIZED=$(echo "$SANITIZED" | cut -c1-8)
            ENV_NAME="epcubegraph-${SANITIZED}"
            echo "env_name=${ENV_NAME}" >> "$GITHUB_OUTPUT"
            echo "state_key=${ENV_NAME}.tfstate" >> "$GITHUB_OUTPUT"
            echo "kv_name=${ENV_NAME}-kv" >> "$GITHUB_OUTPUT"
            echo "✓ Branch '$BRANCH' → env '${ENV_NAME}'"
          fi

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: infra
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          terraform init -input=false \
            -backend-config="resource_group_name=tfstate-rg" \
            -backend-config="storage_account_name=tfstateepcubegraph" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=${{ steps.env.outputs.state_key }}" \
            -backend-config="use_oidc=true" \
            -backend-config="use_azuread_auth=true"

      - name: Bootstrap Init
        working-directory: infra/bootstrap
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          terraform init -input=false \
            -backend-config="resource_group_name=tfstate-rg" \
            -backend-config="storage_account_name=tfstateepcubegraph" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=${{ steps.env.outputs.state_key }}-bootstrap" \
            -backend-config="use_oidc=true" \
            -backend-config="use_azuread_auth=true"

      # Re-authenticate — OIDC token may have expired during firewall propagation wait
      - name: Azure Re-Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Destroy
        working-directory: infra
        id: destroy
        continue-on-error: true
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_environment_name: ${{ steps.env.outputs.env_name }}
          TF_VAR_epcube_username: ${{ secrets.EPCUBE_USERNAME }}
          TF_VAR_epcube_password: ${{ secrets.EPCUBE_PASSWORD }}
        run: terraform destroy -auto-approve -input=false -var-file=custom-domains-${{ github.event.inputs.environment }}.tfvars

      # Re-authenticate — OIDC token may have expired during long destroy
      - name: Azure Re-Login for Retry (OIDC)
        if: steps.destroy.outcome == 'failure'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Destroy — Retry
        if: steps.destroy.outcome == 'failure'
        working-directory: infra
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_environment_name: ${{ steps.env.outputs.env_name }}
          TF_VAR_epcube_username: ${{ secrets.EPCUBE_USERNAME }}
          TF_VAR_epcube_password: ${{ secrets.EPCUBE_PASSWORD }}
        run: |
          echo "⚠ First destroy failed — refreshing state and retrying with fresh token..."
          terraform refresh -input=false
          terraform destroy -auto-approve -input=false -var-file=custom-domains-${{ github.event.inputs.environment }}.tfvars

      - name: Delete state blob
        run: |
          az storage blob delete \
            --account-name "$TFSTATE_STORAGE_ACCOUNT" \
            --container-name tfstate \
            --name "${{ steps.env.outputs.state_key }}" \
            --auth-mode login \
            --output none 2>/dev/null || true
          echo "✓ State file ${{ steps.env.outputs.state_key }} deleted"

      # Bootstrap destroy — remove RG, KV, runner PE (reverse order)
      - name: Bootstrap Destroy
        working-directory: infra/bootstrap
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_environment_name: ${{ steps.env.outputs.env_name }}
        run: terraform destroy -auto-approve -input=false

      - name: Delete bootstrap state blob
        run: |
          az storage blob delete \
            --account-name "$TFSTATE_STORAGE_ACCOUNT" \
            --container-name tfstate \
            --name "${{ steps.env.outputs.state_key }}-bootstrap" \
            --auth-mode login \
            --output none
          echo "✓ Bootstrap state file deleted"
