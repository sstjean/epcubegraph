# EP Cube Graph — Cloud Exporter with Local Storage (macOS testing)
#
# Runs the EP Cube cloud exporter + VictoriaMetrics + vmagent in Docker.
# The cloud exporter polls monitoring-us.epcube.com for real-time data
# and exposes Prometheus metrics for VictoriaMetrics to scrape.
#
# Usage:
#   # 1. Copy .env.example to .env and set EPCUBE_USERNAME / EPCUBE_PASSWORD
#   cp .env.example .env && $EDITOR .env
#
#   # 2. Start everything
#   docker compose -f docker-compose.prod-local.yml up -d
#
#   # 3. (Optional) Run the API
#   cd ../api/src/EpCubeGraph.Api && EPCUBE_DISABLE_AUTH=true ASPNETCORE_ENVIRONMENT=Development dotnet run
#
# Web UIs:
#   VictoriaMetrics (vmui):  http://localhost:8428/vmui
#   vmagent targets:         http://localhost:8429/targets
#   cloud exporter:          http://localhost:9200/metrics

services:
  epcube-exporter:
    build:
      context: ./epcube-exporter
    environment:
      - EPCUBE_USERNAME=${EPCUBE_USERNAME}
      - EPCUBE_PASSWORD=${EPCUBE_PASSWORD}
      - EPCUBE_PORT=9200
      - EPCUBE_INTERVAL=60
      - EPCUBE_DISABLE_AUTH=true
    ports:
      - "9200:9200"
    restart: unless-stopped

  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.106.1
    command:
      - "-retentionPeriod=30d"
      - "-storageDataPath=/victoria-metrics-data"
      - "-httpListenAddr=:8428"
    ports:
      - "8428:8428"
    volumes:
      - vm-prod-data:/victoria-metrics-data
    restart: unless-stopped

  vmagent:
    image: victoriametrics/vmagent:v1.106.1
    command:
      - "-promscrape.config=/etc/vmagent/scrape.yml"
      - "-remoteWrite.url=http://victoriametrics:8428/api/v1/write"
      - "-httpListenAddr=:8429"
    ports:
      - "8429:8429"
    volumes:
      - ./vmagent/scrape-prod-local.yml:/etc/vmagent/scrape.yml:ro
    depends_on:
      - victoriametrics
      - epcube-exporter
    restart: unless-stopped

volumes:
  vm-prod-data:
    driver: local
