# EP Cube Graph — Cloud Exporter with PostgreSQL (macOS testing)
#
# Runs the EP Cube cloud exporter + PostgreSQL in Docker.
# The cloud exporter polls monitoring-us.epcube.com for real-time data
# and writes readings directly to PostgreSQL.
#
# Usage:
#   # 1. Copy .env.example to .env and set EPCUBE_USERNAME / EPCUBE_PASSWORD
#   cp .env.example .env && $EDITOR .env
#
#   # 2. Start everything
#   docker compose -f docker-compose.prod-local.yml up -d
#
#   # 3. (Optional) Run the API
#   cd ../api/src/EpCubeGraph.Api && EPCUBE_DISABLE_AUTH=true ASPNETCORE_ENVIRONMENT=Development dotnet run
#
# Web UIs:
#   cloud exporter:  http://localhost:9250/metrics
#   PostgreSQL:      localhost:5432 (user: epcube, db: epcubegraph)

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: epcube
      POSTGRES_PASSWORD: epcube_local
      POSTGRES_DB: epcubegraph
    ports:
      - "5432:5432"
    volumes:
      - pg-prod-data:/var/lib/postgresql/data
    restart: unless-stopped

  epcube-exporter:
    build:
      context: ./epcube-exporter
    environment:
      - EPCUBE_USERNAME=${EPCUBE_USERNAME}
      - EPCUBE_PASSWORD=${EPCUBE_PASSWORD}
      - EPCUBE_PORT=9250
      - EPCUBE_INTERVAL=60
      - EPCUBE_DISABLE_AUTH=true
      - POSTGRES_DSN=postgresql://epcube:epcube_local@postgres:5432/epcubegraph
    ports:
      - "9250:9250"
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  pg-prod-data:
    driver: local
