# EP Cube Graph — Local Development: epcube-exporter + vmagent
# For local testing that writes to Azure VictoriaMetrics.
# Production deployment is fully in Azure — see infra/deploy.sh.
#
# The epcube-exporter polls the EP Cube cloud API (monitoring-us.epcube.com)
# and exposes Prometheus metrics. vmagent scrapes and remote-writes to Azure.
#
# Usage:
#   cp .env.example .env  # Edit with EP Cube credentials and remote-write config
#   docker compose up -d
#
# Environment variables (.env):
#   EPCUBE_USERNAME     — EP Cube cloud account email
#   EPCUBE_PASSWORD     — EP Cube cloud account password
#   REMOTE_WRITE_URL    — Azure-hosted VictoriaMetrics write endpoint
#   REMOTE_WRITE_TOKEN  — Bearer token for remote-write auth

services:
  epcube-exporter:
    build:
      context: ./epcube-exporter
    environment:
      - EPCUBE_USERNAME=${EPCUBE_USERNAME:-}
      - EPCUBE_PASSWORD=${EPCUBE_PASSWORD:-}
      - EPCUBE_PORT=9200
      - EPCUBE_INTERVAL=60
    restart: unless-stopped

  vmagent:
    image: victoriametrics/vmagent:v1.106.1
    command:
      - "-promscrape.config=/etc/vmagent/scrape.yml"
      - "-remoteWrite.url=${REMOTE_WRITE_URL:-http://localhost:8428/api/v1/write}"
      - "-remoteWrite.bearerTokenFile=/run/secrets/remote_write_token"
      - "-remoteWrite.tmpDataPath=/vmagent-data"
      - "-remoteWrite.maxDiskUsagePerURL=1GB"
    env_file: .env
    volumes:
      - ./vmagent/scrape.yml:/etc/vmagent/scrape.yml:ro
      - vmagent-data:/vmagent-data
    secrets:
      - remote_write_token
    depends_on:
      - epcube-exporter
    restart: unless-stopped

secrets:
  remote_write_token:
    environment: "REMOTE_WRITE_TOKEN"

volumes:
  vmagent-data:
    driver: local
