# vmagent scrape configuration for production-local testing (macOS)
# Scrapes epcube-exporter (cloud API bridge) running in Docker

scrape_configs:
  - job_name: epcube
    static_configs:
      - targets: ["epcube-exporter:9200"]
    metrics_path: /metrics
    scrape_interval: 60s
    scrape_timeout: 30s
