# EP Cube Graph — Mock Stack (automated testing only)
#
# Runs mock services for CI and automated tests. For manual local
# development with live data, use docker-compose.prod-local.yml
# (via ./deploy.sh).
#
# Services:
#   mock-exporter  → generates fake EP Cube metrics and writes to PostgreSQL
#   postgres       → local database
#
# Usage:
#   docker compose -f docker-compose.local.yml up -d
#   cd ../api/src/EpCubeGraph.Api && dotnet run
#
# After ~2 minutes, mock data appears in PostgreSQL:
#   psql postgresql://epcube:epcube_local@localhost:5432/epcubegraph -c "SELECT COUNT(*) FROM readings"

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: epcube
      POSTGRES_PASSWORD: epcube_local
      POSTGRES_DB: epcubegraph
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    restart: unless-stopped

  mock-exporter:
    build:
      context: ./mock-exporter
      dockerfile: Dockerfile
    environment:
      - POSTGRES_DSN=postgresql://epcube:epcube_local@postgres:5432/epcubegraph
    ports:
      - "9191:9191"
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  pg-data:
    driver: local
