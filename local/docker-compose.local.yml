# EP Cube Graph — Local Development Stack (no Azure dependencies)
#
# Runs the full ingestion pipeline locally with mock data:
#   mock-exporter  → generates fake EP Cube Prometheus metrics
#   vmagent        → scrapes mock-exporter, writes to local VictoriaMetrics
#   victoriametrics → local time-series DB (replaces Azure Container Apps)
#
# The API runs on the host via `dotnet run` and queries VictoriaMetrics
# at http://localhost:8428 (default in appsettings.Development.json).
#
# Usage:
#   docker compose -f docker-compose.local.yml up -d
#   cd ../api/src/EpCubeGraph.Api && dotnet run
#
# After ~2 minutes, mock data appears in VictoriaMetrics:
#   curl 'http://localhost:8428/api/v1/query?query=echonet_battery_state_of_capacity_percent'
#
# Web UIs:
#   VictoriaMetrics (vmui):  http://localhost:8428/vmui
#   vmagent targets:         http://localhost:8429/targets

services:
  mock-exporter:
    build:
      context: ./mock-exporter
      dockerfile: Dockerfile
    ports:
      - "9191:9191"
    restart: unless-stopped

  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.106.1
    command:
      - "-retentionPeriod=30d"
      - "-storageDataPath=/victoria-metrics-data"
      - "-httpListenAddr=:8428"
    ports:
      - "8428:8428"
    volumes:
      - vm-data:/victoria-metrics-data
    restart: unless-stopped

  vmagent:
    image: victoriametrics/vmagent:v1.106.1
    command:
      - "-promscrape.config=/etc/vmagent/scrape.yml"
      - "-remoteWrite.url=http://victoriametrics:8428/api/v1/write"
      - "-httpListenAddr=:8429"
    ports:
      - "8429:8429"
    volumes:
      - ./vmagent/scrape-local.yml:/etc/vmagent/scrape.yml:ro
    depends_on:
      - mock-exporter
      - victoriametrics
    restart: unless-stopped

volumes:
  vm-data:
    driver: local
